    <h2 id="fixtures">Fixtures</h2>
    <div class="fixture-filters">
      <label>
        Team
        <select id="filter-team" aria-label="Filter by team">
          <option value="all">All teams</option>
          <option value="1">1st XI</option>
          <option value="m">Midweek</option>
          <option value="f">Friendly</option>
        </select>
      </label>
      <label>
        Venue

      </label>
      <label class="filter-check">
        <input type="checkbox" id="filter-upcoming"> Upcoming only
      </label>
    </div>

    <div class="table-scroll">
      <table id="season-fixtures">
        <thead>
          <tr>
            <th>Date</th>
            <th>Opposition</th>
            <th>Venue</th>
            <th>Team</th>
